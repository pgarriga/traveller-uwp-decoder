<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgC)"/>
  <!-- Scanning lines effect -->
  <line x1="80" y1="176" x2="432" y2="176" stroke="#fff" stroke-width="8" opacity="0.3"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#fff" stroke-width="8" opacity="0.3"/>
  <line x1="80" y1="336" x2="432" y2="336" stroke="#fff" stroke-width="8" opacity="0.3"/>
  <!-- UWP text -->
  <text x="256" y="256" font-family="monospace" font-size="200" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="central">UWP</text>
  <!-- Scanner corner brackets -->
  <path d="M80 140 L80 80 L140 80" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
  <path d="M432 140 L432 80 L372 80" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
  <path d="M80 372 L80 432 L140 432" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
  <path d="M432 372 L432 432 L372 432" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
</svg>
